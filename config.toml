[paths]
artifacts_dir = "artifacts"
reports_dir   = "reports"

[sandbox]
image        = "pkgids-sandbox:latest"
runtime      = "runsc"
timeout_secs = 120
network      = "none"
memory       = "1g"
cpus         = 1.0
pids_limit   = 256

[fakeinternet]
network        = "detonet"
subnet         = "10.200.200.0/24"
container_name = "pkgids-fakeinternet"
ip             = "10.200.200.2"
image          = "pkgids-fakeinternet:latest"
logs_dir       = "logs/fakeinternet"

[detonation]
runs_dir                       = "runs"
skip_import                    = false
clear_logs_each_run            = true
post_install_idle_secs         = 2
post_import_idle_secs          = 2
skip_import_on_install_failure = false

[telemetry]
enabled              = true
backend              = "strace"
trace_syscalls       = [
    "execve", "execveat",
    "open", "openat", "unlink", "rename", "mkdir",
    "chmod", "chown",
    "connect", "socket",
    "kill", "ptrace",
]
capture_sensitive_only = false
max_arg_len            = 512

[diffing]
enabled        = true
# Baseline mode when from_version is auto-resolved:
#   previous_version        — the version tested just before the candidate (run_ts order)
#   previous_known_good     — latest version with prediction=benign and no suspicious flags
#   rolling_benign_baseline — feature envelope across the N most recent benign versions
baseline_mode  = "previous_known_good"
rolling_window = 5
store_profiles = true
profile_store  = "supabase"

[reporting]
enabled           = true
json              = true
html              = true
include_pcap_link = true
attack_mapping    = "tactic_level"

[scoring]
enabled = true
scale   = "0-100"

[scoring.verdict_thresholds]
benign           = 24
suspicious       = 49
likely_malicious = 74

[logging]
level = "INFO"
