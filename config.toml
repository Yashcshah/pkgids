[paths]
artifacts_dir = "artifacts"
reports_dir   = "reports"

[sandbox]
image        = "pkgids-sandbox:latest"
runtime      = "runsc"
timeout_secs = 120
network      = "none"
memory       = "1g"
cpus         = 1.0
pids_limit   = 256

[fakeinternet]
network        = "detonet"
subnet         = "10.200.200.0/24"
container_name = "pkgids-fakeinternet"
ip             = "10.200.200.2"
image          = "pkgids-fakeinternet:latest"
logs_dir       = "logs/fakeinternet"

[detonation]
runs_dir    = "runs"
skip_import = false

[scoring]
malicious_threshold  = 0.8
suspicious_threshold = 0.5

[logging]
level = "INFO"
